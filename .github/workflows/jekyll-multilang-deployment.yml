name: Build and Deploy Multilingual Jekyll Site

on:
  push:
    branches:
      - main
      - french
      - german
      - portuguese
      - spanish
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (English)
        uses: actions/checkout@v4
        with:
          ref: main
          path: repo-main

      - name: Checkout Spanish
        uses: actions/checkout@v4
        with:
          ref: spanish
          path: repo-spanish

      - name: Checkout French
        uses: actions/checkout@v4
        with:
          ref: french
          path: repo-french

      - name: Checkout German
        uses: actions/checkout@v4
        with:
          ref: german
          path: repo-german

      - name: Checkout Portuguese
        uses: actions/checkout@v4
        with:
          ref: portuguese
          path: repo-portuguese

      - name: Prepare unified structure
        run: |
          mkdir site
          mkdir -p site/_data

          mkdir -p site/en
          rsync -av --exclude="_data" repo-main/ site/en/
          cp repo-main/_data/en.yml site/_data/

          mkdir -p site/es
          rsync -av --exclude="_data" repo-spanish/ site/es/
          cp repo-spanish/_data/es.yml site/_data/

          # mkdir -p site/fr
          # rsync -av --exclude="_data" repo-french/ site/fr/
          # cp repo-french/_data/fr.yml site/_data/

          # mkdir -p site/de
          # rsync -av --exclude="_data" repo-german/ site/de/
          # cp repo-german/_data/de.yml site/_data/

          # mkdir -p site/pt
          # rsync -av --exclude="_data" repo-portuguese/ site/pt/
          # cp repo-portuguese/_data/pt.yml site/_data/

          # remove .git folders if any
          find site -name ".git" -type d -exec rm -rf {} + || true

      - name: Copy config + layouts
        run: |
          cp repo-main/_config.yml site/
          mkdir -p site/_layouts
          cp -r repo-main/_layouts/* site/_layouts/ || true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
          bundler-cache: true

      - name: Install Jekyll
        run: |
          gem install jekyll bundler

      - name: Build site
        run: |
          cd site
          jekyll build -d _site

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/_site
