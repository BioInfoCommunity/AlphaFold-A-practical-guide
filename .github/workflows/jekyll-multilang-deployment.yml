name: Build and Deploy Multilingual Jekyll Site

on:
  push:
    branches:
      - main
      - spanish
      - french
      - german
      - portuguese
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout current branch only
      # ----------------------------
      - name: Checkout branch
        uses: actions/checkout@v4

      # ----------------------------
      # Determine language from branch
      # ----------------------------
      - name: Set language
        id: lang
        run: |
          case "${GITHUB_REF##*/}" in
            main) echo "LANG=en" >> $GITHUB_ENV ;;
            spanish) echo "LANG=es" >> $GITHUB_ENV ;;
            french) echo "LANG=fr" >> $GITHUB_ENV ;;
            german) echo "LANG=de" >> $GITHUB_ENV ;;
            portuguese) echo "LANG=pt" >> $GITHUB_ENV ;;
            *) echo "LANG=en" >> $GITHUB_ENV ;;
          esac
          echo "Building language: $LANG"

      # ----------------------------
      # Set up Node.js for navigation
      # ----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      # ----------------------------
      # Install dependencies
      # ----------------------------
      - name: Install Node dependencies
        run: |
          npm init -y
          npm install js-yaml

      # ----------------------------
      # Prepare site folder
      # ----------------------------
      - name: Prepare site folder
        run: |
          mkdir site
          mkdir -p site/_data
          mkdir -p site/$LANG

          # Copy branch markdown files
          rsync -av --exclude="_data" --exclude=".git" ./ site/$LANG/
          
          # Copy language-specific data files
          if [ -d "./_data" ]; then
            cp ./_data/${LANG}.yml site/_data/
          fi

      # ----------------------------
      # Generate navigation YAML
      # ----------------------------
      - name: Generate navigation
        run: |
          cd site
          node ../scripts/generateNavigation.js

      # ----------------------------
      # Copy layouts and config
      # ----------------------------
      - name: Copy layouts + config
        run: |
          cp ./_config.yml site/
          mkdir -p site/_layouts
          cp -r ./_layouts/* site/_layouts/ || true

      # ----------------------------
      # Add Gemfile for Jekyll
      # ----------------------------
      - name: Create Gemfile
        run: |
          cat <<EOF > site/Gemfile
          source "https://rubygems.org"
          gem "jekyll", "~> 4.3"
          EOF

      # ----------------------------
      # Setup Ruby
      # ----------------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
          bundler-cache: true
          working-directory: site

      # ----------------------------
      # Build Jekyll
      # ----------------------------
      - name: Build site
        run: |
          cd site
          bundle install
          bundle exec jekyll build --trace

      # ----------------------------
      # Debug build
      # ----------------------------
      - name: Debug build output
        run: ls -R site/_site | head -100

      # ----------------------------
      # Deploy to gh-pages/<lang>
      # ----------------------------
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/_site
          destination_dir: ${{ env.LANG }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
