name: Deploy branch to GitHub Pages

on:
  push:
    branches:
      - main
      - es
      - fr
      - de
      - pt

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ Set up Node.js to run your generateNavigation.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      # 3️⃣ Run your navigation generation script
      - name: Generate navigation
        run: node scripts/generateNavigation.js

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages        # 👈 ensure this line exists
          publish_dir: ./                 # 👈 adjust if your site is in ./docs
          destination_dir: ${{ github.ref_name }}
